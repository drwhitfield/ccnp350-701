<script>
    let currentQuestionIndex = 0;
    let rawQuestions = [];

    function getAnswers(base64Ans) {
        try {
            return atob(base64Ans).trim().split(/[\s,]+/);
        } catch(e) {
            return [];
        }
    }

    function buildQuiz() {
        const dataElement = document.getElementById('quiz-data');
        rawQuestions = JSON.parse(dataElement.textContent);
        
        const quizArea = document.getElementById('quiz-area');
        let html = '';
        
        rawQuestions.forEach((q, idx) => {
            // Fix: Add the 'active' class to the first card index so it becomes visible
            const activeClass = idx === 0 ? 'quiz-card active' : 'quiz-card';
            
            html += `
                <div class="${activeClass}" id="q-card-${idx}">
                    <div class="domain-badge">${q.domain}</div>
                    <div class="question-text">Question ${q.number}: ${q.question}</div>
                    ${q.has_image ? `<div class="exhibit-container"><img src="exhibits/image_${q.number}.png" class="exhibit-img" alt="Question Exhibit"></div>` : ''}
                    <div class="options-container">
                        ${q.options.map(opt => `
                            <label class="option-label" id="label-${idx}-${opt.letter}">
                                <input type="${getAnswers(q.answer).length > 1 ? 'checkbox' : 'radio'}" 
                                       name="question-${idx}" 
                                       value="${opt.letter}">
                                <strong>${opt.letter}.</strong> ${opt.text}
                            </label>
                        `).join('')}
                    </div>
                    <div class="explanation" id="explain-${idx}">
                        <strong>Explanation:</strong> ${q.explanation}
                    </div>
                </div>
            `;
        });
        
        quizArea.innerHTML = html;
        updateNavButtons();
    }

    function changeQuestion(direction) {
        // Hide the current question card
        document.getElementById(`q-card-${currentQuestionIndex}`).classList.remove('active');
        
        // Calculate and validate the new index position
        currentQuestionIndex += direction;
        if (currentQuestionIndex < 0) currentQuestionIndex = 0;
        if (currentQuestionIndex >= rawQuestions.length) currentQuestionIndex = rawQuestions.length - 1;
        
        // Display the newly targeted question card
        document.getElementById(`q-card-${currentQuestionIndex}`).classList.add('active');
        updateNavButtons();
    }

    function updateNavButtons() {
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        
        // Enable/Disable buttons natively
        prevBtn.disabled = (currentQuestionIndex === 0);
        nextBtn.disabled = (currentQuestionIndex === rawQuestions.length - 1);
        
        // Visually update buttons to show their interactive status
        prevBtn.style.opacity = (currentQuestionIndex === 0) ? '0.5' : '1';
        prevBtn.style.cursor = (currentQuestionIndex === 0) ? 'not-allowed' : 'pointer';
        
        nextBtn.style.opacity = (currentQuestionIndex === rawQuestions.length - 1) ? '0.5' : '1';
        nextBtn.style.cursor = (currentQuestionIndex === rawQuestions.length - 1) ? 'not-allowed' : 'pointer';
    }

    function gradeQuiz() {
        let score = 0;
        rawQuestions.forEach((q, idx) => {
            const correctAnswers = getAnswers(q.answer);
            const selected = Array.from(document.querySelectorAll(`input[name="question-${idx}"]:checked`)).map(el => el.value);
            const explainDiv = document.getElementById(`explain-${idx}`);
            
            let isCorrect = selected.length === correctAnswers.length && selected.every(val => correctAnswers.includes(val));
            
            q.options.forEach(opt => {
                const label = document.getElementById(`label-${idx}-${opt.letter}`);
                if (correctAnswers.includes(opt.letter)) {
                    label.classList.add('right-ans');
                } else if (selected.includes(opt.letter)) {
                    label.classList.add('wrong-ans');
                }
            });

            explainDiv.style.display = 'block';
            if (isCorrect) score++;
        });
        
        // Reveal all questions smoothly so you can scroll down and review the results
        document.querySelectorAll('.quiz-card').forEach(card => card.classList.add('active'));
        
        // Hide pagination buttons during review mode
        const actionContainer = document.querySelector('.action-container');
        if (actionContainer) actionContainer.style.display = 'none';
        
        alert(`Module 2 Completed!\nScore: ${score} / ${rawQuestions.length}`);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Run layout generator on load
    buildQuiz();
</script>
