</script>
<script>
        const rawQuestions = JSON.parse(document.getElementById('quiz-data').textContent);
        let currentIdx = 0;
        let score = 0;

        function base64Decode(str) { try { return atob(str); } catch (e) { return str; } }
        function getAnswers(obfuscated) { return base64Decode(obfuscated).replace(/[^A-G]/gi, '').split(''); }
        function isMultiSelect(questionText) { 
            const text = questionText.toLowerCase();
            return text.includes('(choose two)') || text.includes('(choose three)');
        }

        function buildQuiz() {
            const quizArea = document.getElementById('quiz-area');
            rawQuestions.forEach((q, idx) => {
                const card = document.createElement('div');
                card.className = `quiz-card ${idx === 0 ? 'active' : ''}`;
                card.id = `card-${idx}`;
                card.innerHTML = `<div class="domain-badge">Q${q.number} - ${q.domain}</div>
                                  <div class="question-text">${q.question}</div>`;
                
                const multi = isMultiSelect(q.question);
                q.options.forEach(opt => {
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    label.id = `label-${idx}-${opt.letter}`;
                    label.innerHTML = `<input type="${multi ? 'checkbox' : 'radio'}" name="question-${idx}" value="${opt.letter}"> ${opt.letter}. ${opt.text}`;
                    card.appendChild(label);
                });

                const explainDiv = document.createElement('div');
                explainDiv.className = 'explanation';
                explainDiv.id = `explain-${idx}`;
                explainDiv.innerHTML = `<strong>Explanation:</strong><br>${q.explanation}`;
                card.appendChild(explainDiv);
                quizArea.appendChild(card);
            });
            updateNav();
        }

        function changeQuestion(dir) {
            document.getElementById(`card-${currentIdx}`).classList.remove('active');
            currentIdx += dir;
            document.getElementById(`card-${currentIdx}`).classList.add('active');
            updateNav();
        }

        function updateNav() {
            document.getElementById('prev-btn').disabled = currentIdx === 0;
            document.getElementById('next-btn').style.display = currentIdx === rawQuestions.length - 1 ? 'none' : 'inline-block';
            document.getElementById('submit-btn').style.display = currentIdx === rawQuestions.length - 1 ? 'inline-block' : 'none';
            // Finish button is hidden only after the quiz is submitted (handled by action-container styling in gradeQuiz)[cite: 1]
            document.getElementById('finish-btn').style.display = currentIdx === rawQuestions.length - 1 ? 'none' : 'inline-block';
        }

        function gradeQuiz() {
            score = 0;
            rawQuestions.forEach((q, idx) => {
                const correctAnswers = getAnswers(q.answer);
                const selected = Array.from(document.querySelectorAll(`input[name="question-${idx}"]:checked`)).map(el => el.value);
                const explainDiv = document.getElementById(`explain-${idx}`);
                let isCorrect = selected.length === correctAnswers.length && selected.every(val => correctAnswers.includes(val));
                
                q.options.forEach(opt => {
                    const label = document.getElementById(`label-${idx}-${opt.letter}`);
                    if (correctAnswers.includes(opt.letter)) label.classList.add('right-ans');
                    else if (selected.includes(opt.letter)) label.classList.add('wrong-ans');
                });
                explainDiv.style.display = 'block';
                if (isCorrect) score++;
            });
            document.querySelectorAll('.quiz-card').forEach(card => card.classList.add('active'));
            document.querySelector('.action-container').style.display = 'none';
            alert(`Module 3 Completed!\nScore: ${score} / ${rawQuestions.length}`);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        buildQuiz();
    </script>
