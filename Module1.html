    <script>
        const rawQuestions = JSON.parse(document.getElementById('quiz-data').textContent);
        const moduleNum = "1";
        
        function getAnswers(obfuscated) {
            return atob(obfuscated).split(',');
        }

        function buildQuiz() {
            const quizArea = document.getElementById('quiz-area');
            let html = '';
            
            rawQuestions.forEach((q, idx) => {
                const decodedAns = getAnswers(q.answer);
                const isMulti = decodedAns.length > 1;
                const inputType = isMulti ? 'checkbox' : 'radio';
                
                let imageTag = '';
                if (q.has_image) {
                    imageTag = `<img src="images/module${moduleNum}_q${q.number}.png" class="exhibit-img" alt="Exhibit Image (Missing or Saved in /images)">`;
                }

                html += `
                <div class="quiz-card" id="q-card-${idx}">
                    <span class="domain-badge">${q.domain}</span>
                    <div class="question-text">Question ${q.number}: ${q.question}</div>
                    ${imageTag}
                    <div class="options-block">
                `;

                q.options.forEach(opt => {
                    html += `
                        <label class="option-label" id="label-${idx}-${opt.letter}">
                            <input type="${inputType}" name="question-${idx}" value="${opt.letter}">
                            <strong>${opt.letter}.</strong> ${opt.text}
                        </label>
                    `;
                });

                html += `
                    </div>
                    <div class="explanation" id="explain-${idx}">
                        <strong>Explanation:</strong> ${q.explanation}
                    </div>
                </div>
                `;
            });
            
            quizArea.innerHTML = html;
        }

        function gradeQuiz() {
            let score = 0;
            rawQuestions.forEach((q, idx) => {
                const correctAnswers = getAnswers(q.answer);
                const selected = Array.from(document.querySelectorAll(`input[name="question-${idx}"]:checked`)).map(el => el.value);
                const card = document.getElementById(`q-card-${idx}`);
                const explainDiv = document.getElementById(`explain-${idx}`);
                
                let isCorrect = selected.length === correctAnswers.length && selected.every(val => correctAnswers.includes(val));
                
                q.options.forEach(opt => {
                    const label = document.getElementById(`label-${idx}-${opt.letter}`);
                    if (correctAnswers.includes(opt.letter)) {
                        label.classList.add('right-ans');
                    } else if (selected.includes(opt.letter)) {
                        label.classList.add('wrong-ans');
                    }
                });

                explainDiv.style.display = 'block';
                
                if (isCorrect) {
                    score++;
                }
            });
            
            alert(`You completed the quiz! Score: ${score} / ${rawQuestions.length}`);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        buildQuiz();
    </script>
