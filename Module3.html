    "answer": "QQpF",
    "explanation": "A DoS (Denial of Service) attack is a type of cyberattack that aims to disrupt the normal functioning of a server, service, or network by overwhelming it with a large amount of traffic or requests. A DoS attack typically uses a single computer or device to launch the attack, sending TCP (Transmission Control Protocol) or UDP (User Datagram Protocol) packets to the target server .TCP and UDP are two common protocols used to send data over the internet. TCP packets require a connection to be established between the sender and the receiver, and ensure that the data is delivered reliably and in order .UDP packets do not require a connection, and do not guarantee the delivery or order of the data. Both TCP and UDP packets can be used to flood a server with requests, consuming its resources and bandwidth, and preventing legitimate users from accessing the service. A DDoS (Distributed Denial of Service) attack is a type of DoS attack that uses multiple computers or devices to launch the attack, creating a large network of attackers that can generate more traffic or requests than a single source. A DDoS attack often involves a botnet, which is a network of compromised computers or devices that are controlled by a malicious actor, usually through malware or hacking. The botnet can send TCP or UDP packets to the target server from different locations and IP addresses, making it harder to trace and block the attack. A DDoS attack can also target multiple servers or services that are distributed over a LAN (Local Area Network), such as a web hosting service or a cloud computing platform, affecting the availability and performance of the entire network. The main difference between a DoS attack and a DDoS attack is the number and diversity of the sources that are involved in the attack. A DoS attack comes from a single source, while a DDoS attack comes from multiple sources. This makes a DDoS attack more powerful, faster, and harder to stop than a DoS attack.     "answer": "QgpF",
    "explanation": "vulnerability is a flaw or gap in the security of a system or network that can be exploited by an attacker to compromise its functionality, integrity, confidentiality, or availability. A vulnerability can   Questions & Answers PDF P-258  exist in the design, implementation, configuration, or operation of a system or network, and can be caused by human errors, software bugs, hardware defects, or environmental factors. A vulnerability can be exploited by an attacker using various methods, such as malware, phishing, brute force, denial-of-service, or injection attacks. A vulnerability can also be exploited by an insider who has legitimate access to the system or network, but abuses their privileges for malicious purposes. A vulnerability can be discovered by security researchers, ethical hackers, or malicious hackers, and can be reported to the vendor or the public for remediation or exploitation. A vulnerability can be mitigated by applying patches, updates, or configuration changes, or by using security tools such as firewalls, antivirus, or encryption. An exploit is a piece of code, data, or technique that takes advantage of a vulnerability to perform unauthorized or malicious actions on a system or network. An exploit can be used to gain access, escalate privileges, execute commands, steal data, disrupt services, or damage resources. An exploit can be delivered by various means, such as email attachments, web links, removable media, or network packets. An exploit can be developed by security researchers, ethical hackers, or malicious hackers, and can be shared or sold on the dark web or other platforms for testing or attacking purposes. An exploit can be detected by security tools such as intrusion detection systems, antivirus, or anti-exploit software. The difference between a vulnerability and an exploit is that a vulnerability is a potential weakness that can be exploited, while an exploit is an actual attack that uses a vulnerability. A vulnerability can exist without being exploited, but an exploit cannot exist without a vulnerability. A vulnerability can be fixed or prevented, but an exploit can only be blocked or stopped.\u00a0Reference\u00a0:= Exploit vs Vulnerability: What\u2019s the Difference? - InfoSec Insights Difference Between Vulnerability and Exploit - GeeksforGeeks Exploit vs. Vulnerability: What Is the Difference? - Coralogix Exploit vs Vulnerability: What\u2019s the Difference? - Cybers Guards",

<script>
    let currentQuestionIndex = 0;
    let rawQuestions = [];

    function getAnswers(base64Ans) {
        try {
            return atob(base64Ans).trim().split(/[\s,]+/);
        } catch(e) {
            return [];
        }
    }

    function buildQuiz() {
        const dataElement = document.getElementById('quiz-data');
        rawQuestions = JSON.parse(dataElement.textContent);
        
        const quizArea = document.getElementById('quiz-area');
        let html = '';
        
        rawQuestions.forEach((q, idx) => {
            // Fix: Add the 'active' class to the first card index so it becomes visible
            const activeClass = idx === 0 ? 'quiz-card active' : 'quiz-card';
            
            html += `
                <div class="${activeClass}" id="q-card-${idx}">
                    <div class="domain-badge">${q.domain}</div>
                    <div class="question-text">Question ${q.number}: ${q.question}</div>
                    ${q.has_image ? `<div class="exhibit-container"><img src="exhibits/image_${q.number}.png" class="exhibit-img" alt="Question Exhibit"></div>` : ''}
                    <div class="options-container">
                        ${q.options.map(opt => `
                            <label class="option-label" id="label-${idx}-${opt.letter}">
                                <input type="${getAnswers(q.answer).length > 1 ? 'checkbox' : 'radio'}" 
                                       name="question-${idx}" 
                                       value="${opt.letter}">
                                <strong>${opt.letter}.</strong> ${opt.text}
                            </label>
                        `).join('')}
                    </div>
                    <div class="explanation" id="explain-${idx}">
                        <strong>Explanation:</strong> ${q.explanation}
                    </div>
                </div>
            `;
        });
        
        quizArea.innerHTML = html;
        updateNavButtons();
    }

    function changeQuestion(direction) {
        // Hide the current question card
        document.getElementById(`q-card-${currentQuestionIndex}`).classList.remove('active');
        
        // Calculate and validate the new index position
        currentQuestionIndex += direction;
        if (currentQuestionIndex < 0) currentQuestionIndex = 0;
        if (currentQuestionIndex >= rawQuestions.length) currentQuestionIndex = rawQuestions.length - 1;
        
        // Display the newly targeted question card
        document.getElementById(`q-card-${currentQuestionIndex}`).classList.add('active');
        updateNavButtons();
    }

    function updateNavButtons() {
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        
        // Enable/Disable buttons natively
        prevBtn.disabled = (currentQuestionIndex === 0);
        nextBtn.disabled = (currentQuestionIndex === rawQuestions.length - 1);
        
        // Visually update buttons to show their interactive status
        prevBtn.style.opacity = (currentQuestionIndex === 0) ? '0.5' : '1';
        prevBtn.style.cursor = (currentQuestionIndex === 0) ? 'not-allowed' : 'pointer';
        
        nextBtn.style.opacity = (currentQuestionIndex === rawQuestions.length - 1) ? '0.5' : '1';
        nextBtn.style.cursor = (currentQuestionIndex === rawQuestions.length - 1) ? 'not-allowed' : 'pointer';
    }

    function gradeQuiz() {
        let score = 0;
        rawQuestions.forEach((q, idx) => {
            const correctAnswers = getAnswers(q.answer);
            const selected = Array.from(document.querySelectorAll(`input[name="question-${idx}"]:checked`)).map(el => el.value);
            const explainDiv = document.getElementById(`explain-${idx}`);
            
            let isCorrect = selected.length === correctAnswers.length && selected.every(val => correctAnswers.includes(val));
            
            q.options.forEach(opt => {
                const label = document.getElementById(`label-${idx}-${opt.letter}`);
                if (correctAnswers.includes(opt.letter)) {
                    label.classList.add('right-ans');
                } else if (selected.includes(opt.letter)) {
                    label.classList.add('wrong-ans');
                }
            });

            explainDiv.style.display = 'block';
            if (isCorrect) score++;
        });
        
        // Reveal all questions smoothly so you can scroll down and review the results
        document.querySelectorAll('.quiz-card').forEach(card => card.classList.add('active'));
        
        // Hide pagination buttons during review mode
        const actionContainer = document.querySelector('.action-container');
        if (actionContainer) actionContainer.style.display = 'none';
        
        alert(`Module 2 Completed!\nScore: ${score} / ${rawQuestions.length}`);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Run layout generator on load
    buildQuiz();
</script>
