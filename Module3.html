    <script>
        let currentQuestionIndex = 0;
        let rawQuestions = [];

        function getAnswers(base64Ans) {
            try {
                return atob(base64Ans).trim().split(/[\s,]+/);
            } catch(e) {
                return [];
            }
        }

        function buildQuiz() {
            const dataElement = document.getElementById('quiz-data');
            if (!dataElement) return;
            
            try {
                rawQuestions = JSON.parse(dataElement.textContent);
            } catch(err) {
                console.error("Failed to parse JSON data:", err);
                return;
            }

            const quizArea = document.getElementById('quiz-area');
            if (!quizArea) return;
            
            let html = '';
            rawQuestions.forEach((q, idx) => {
                const activeClass = idx === 0 ? 'quiz-card active' : 'quiz-card';
                const isMulti = getAnswers(q.answer).length > 1;
                
                // Sanitize string metrics against rogue character breakouts
                const safeQuestionText = q.question.replace(/`/g, '\\`').replace(/\u201c/g, '"').replace(/\u201d/g, '"');
                const safeExplanation = q.explanation.replace(/`/g, '\\`').replace(/\u201c/g, '"').replace(/\u201d/g, '"');

                html += `
                    <div class="${activeClass}" id="q-card-${idx}">
                        <div class="domain-badge">${q.domain}</div>
                        <div class="question-text">Question ${q.number}: ${safeQuestionText}</div>
                        ${q.has_image ? `<div class="exhibit-container"><img src="exhibits/image_${q.number}.png" class="exhibit-img" alt="Question Exhibit"></div>` : ''}
                        <div class="options-container">
                            ${q.options.map(opt => `
                                <label class="option-label" id="label-${idx}-${opt.letter}">
                                    <input type="${isMulti ? 'checkbox' : 'radio'}" 
                                           name="question-${idx}" 
                                           value="${opt.letter}">
                                    <strong>${opt.letter}.</strong> ${opt.text.replace(/`/g, '\\`')}
                                </label>
                            `).join('')}
                        </div>
                        <div class="explanation" id="explain-${idx}">
                            <strong>Explanation:</strong> ${safeExplanation}
                        </div>
                    </div>
                `;
            });
            
            quizArea.innerHTML = html;
            updateNavButtons();
        }

        function showQuestion(index) {
            if (index < 0) index = 0;
            if (index >= rawQuestions.length) index = rawQuestions.length - 1;
            
            const currentCard = document.getElementById(`q-card-${currentQuestionIndex}`);
            if (currentCard) currentCard.classList.remove('active');
            
            currentQuestionIndex = index;
            
            const nextCard = document.getElementById(`q-card-${currentQuestionIndex}`);
            if (nextCard) nextCard.classList.add('active');
            
            updateNavButtons();
        }

        function changeQuestion(direction) {
            showQuestion(currentQuestionIndex + direction);
        }

        function updateNavButtons() {
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            
            if (prevBtn && nextBtn) {
                const isLast = (currentQuestionIndex === rawQuestions.length - 1);
                
                prevBtn.disabled = (currentQuestionIndex === 0);
                nextBtn.disabled = isLast;
                
                prevBtn.style.opacity = (currentQuestionIndex === 0) ? '0.4' : '1';
                prevBtn.style.cursor = (currentQuestionIndex === 0) ? 'not-allowed' : 'pointer';
                
                nextBtn.style.opacity = isLast ? '0.4' : '1';
                nextBtn.style.cursor = isLast ? 'not-allowed' : 'pointer';
            }
        }

        function gradeQuiz() {
            let score = 0;
            rawQuestions.forEach((q, idx) => {
                const correctAnswers = getAnswers(q.answer);
                const selected = Array.from(document.querySelectorAll(`input[name="question-${idx}"]:checked`)).map(el => el.value);
                const explainDiv = document.getElementById(`explain-${idx}`);
                
                let isCorrect = selected.length === correctAnswers.length && selected.every(val => correctAnswers.includes(val));
                
                q.options.forEach(opt => {
                    const label = document.getElementById(`label-${idx}-${opt.letter}`);
                    if (label) {
                        if (correctAnswers.includes(opt.letter)) {
                            label.classList.add('right-ans');
                        } else if (selected.includes(opt.letter)) {
                            label.classList.add('wrong-ans');
                        }
                    }
                });

                if (explainDiv) explainDiv.style.display = 'block';
                if (isCorrect) score++;
            });
            
            document.querySelectorAll('.quiz-card').forEach(card => card.classList.add('active'));
            
            const actionContainer = document.querySelector('.action-container');
            if (actionContainer) actionContainer.style.display = 'none';
            
            alert(`Module 3 Completed!\nScore: ${score} / ${rawQuestions.length}`);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        buildQuiz();
    </script>
